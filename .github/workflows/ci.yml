name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: test + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: build (non-extension packages)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: @fos/extension is intentionally excluded — WXT 0.20.25 + Vite
      # 5.4 has a "virtual:wxt-plugins" pre-bundle race we can't work
      # around from config. Devs can build locally; this CI step exists to
      # gate the rest of the workspace.
      - name: Build everything except @fos/extension
        run: pnpm turbo run build --filter='!@fos/extension'

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle
          path: packages/sdk/dist
          if-no-files-found: error

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: apps/web/dist
          if-no-files-found: warn
