name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: test + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # WXT prepare (https://github.com/wxt-dev/wxt/issues — regression in
      # 0.20.25 around virtual:wxt-plugins pre-bundling). The extension's
      # tsconfig is self-contained, so typecheck and tests don't need this
      # step. We try it but don't gate CI on it.
      - name: Generate WXT types (best-effort)
        continue-on-error: true
        run: pnpm --filter @fos/extension wxt:prepare

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: build (non-extension packages)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build everything except @fos/extension
        run: pnpm turbo run build --filter='!@fos/extension'

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle
          path: packages/sdk/dist
          if-no-files-found: error

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: apps/web/dist
          if-no-files-found: warn

  extension-build:
    name: extension build (best-effort, blocked on wxt regression)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter @fos/extension build

      - name: Upload extension artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: packages/extension/.output/chrome-mv3
          if-no-files-found: warn
