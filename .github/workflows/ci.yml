name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: test + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate WXT types
        run: pnpm --filter @fos/extension wxt:prepare

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: build all
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate WXT types
        run: pnpm --filter @fos/extension wxt:prepare

      - name: Build
        run: pnpm build

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: packages/extension/.output/chrome-mv3
          if-no-files-found: error

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle
          path: packages/sdk/dist
          if-no-files-found: error
